name: CD – Deploy Cogbit Landing

on:
  workflow_run:
    workflows: ["CI/CD – Cogbit Landing"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: "CD – Docker Build & Deploy"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cogbit-landing:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cogbit-landing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build static export
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials file
        env:
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python3 - <<'EOF'
          import os, pathlib
          home = pathlib.Path.home()
          (home / ".aws").mkdir(exist_ok=True)
          (home / ".aws" / "credentials").write_text(
              "[default]\n"
              f"aws_access_key_id={os.environ['AWS_KEY']}\n"
              f"aws_secret_access_key={os.environ['AWS_SECRET']}\n"
              f"aws_session_token={os.environ['AWS_TOKEN']}\n"
          )
          (home / ".aws" / "config").write_text(
              "[default]\n"
              f"region={os.environ['AWS_REGION']}\n"
          )
          print("Credentials written successfully")
          EOF

      - name: Deploy to S3
        run: |
          aws s3 sync out s3://${{ secrets.S3_BUCKET_NAME }} --delete
